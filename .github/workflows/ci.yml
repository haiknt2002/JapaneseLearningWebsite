name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: List Project Files
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: List project files
        run: |
          echo "Listing project files..."
          find . -not -path './.git/*' -type f | sort
