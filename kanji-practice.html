<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanji Practice</title>
    <style>
        body {
            display: flex;
            margin: 0;
        }
        header {
            background: linear-gradient(to right, orange, yellow);
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
        }
        .container {
            display: flex;
            flex: 1;
        }
        .panel {
            padding: 10px;
            overflow: auto;
        }
        .kanji-selector {
            background: #f4f4f4;
            width: 200px;
        }
        .canvas {
            border: 1px solid black;
            position: relative;
            width: 300px;
            height: 400px;
            background: white;
        }
        .grid {
            background-image: linear-gradient(to right, lightgray 1px, transparent 1px), 
                              linear-gradient(to bottom, lightgray 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .examples {
            background: #f4f4f4;
            width: 200px;
        }
        @media (max-width: 800px) {
            .container {
                flex-direction: column;
            }
            .canvas {
                width: 100%;
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <header>
        Kanji Practice Writing Interface
    </header>
    <div class="container">
        <div class="panel kanji-selector">
            <h3>Kanji Selector</h3>
            <p>Select a kanji:</p>
            <select id="kanjiSelect">
                <option value="日">日</option>
                <option value="月">月</option>
                <option value="火">火</option>
                <option value="水">水</option>
                <option value="木">木</option>
                <option value="金">金</option>
                <option value="土">土</option>
                <option value="曜">曜</option>
            </select>
            <div id="kanjiInfo">
                <p>Info about the selected kanji will appear here.</p>
            </div>
        </div>
        <div class="panel canvas grid">
            <h3>Canvas Drawing Area</h3>
            <canvas id="drawingCanvas"></canvas>
            <script>
                const canvas = document.getElementById('drawingCanvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 300;
                canvas.height = 400;
                
                // Center guide lines
                ctx.strokeStyle = "rgba(0, 0, 0, 0.5)";
                ctx.beginPath();
                ctx.moveTo(150, 0);
                ctx.lineTo(150, 400);
                ctx.moveTo(0, 200);
                ctx.lineTo(300, 200);
                ctx.stroke();
            </script>
        </div>
        <div class="panel examples">
            <h3>Examples</h3>
            <p>Example kanji writing:</p>
            <img src="example-kanji.png" alt="Example Kanji" style="width: 100%;">
            <p>More examples will be added here.</p>
        </div>
    </div>
</body>
</html>
