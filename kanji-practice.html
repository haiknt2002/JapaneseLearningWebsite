<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanji Practice</title>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: Arial, sans-serif; }
        #container { display: flex; width: 80%; }
        #kanji-info { flex: 1; padding: 20px; }
        #canvas-area { flex: 2; display: flex; flex-direction: column; align-items: center; }
        #canvas { border: 1px solid #000; width: 100%; height: 300px; background-color: #f0f0f0; }
        #controls { margin-top: 10px; }
        #instructions { flex: 1; padding: 20px; }
        #kanji-selector { margin: 20px 0; }
    </style>
</head>
<body>
    <div id="container">
        <div id="kanji-info">
            <h2>Kanji Information</h2>
            <div id="kanji-character" style="font-size: 48px;">一</div>
            <div id="kanji-details">Meaning: One</div>
            <div id="kanji-selector">
                <label for="kanji">Select Kanji:</label>
                <select id="kanji">
                    <option value="一">一 (One)</option>
                    <option value="二">二 (Two)</option>
                    <option value="三">三 (Three)</option>
                    <option value="四">四 (Four)</option>
                    <option value="五">五 (Five)</option>
                </select>
            </div>
        </div>
        <div id="canvas-area">
            <canvas id="canvas"></canvas>
            <div id="controls">
                <button onclick="clearCanvas()">Clear Canvas</button>
                <button onclick="nextKanji()">Next Kanji</button>
            </div>
        </div>
        <div id="instructions">
            <h2>Stroke Instructions</h2>
            <ol id="stroke-orders">
                <li>Start from the top.</li>
                <li>Draw from left to right.</li>
                <li>Complete horizontal strokes before vertical strokes.</li>
            </ol>
        </div>
    </div>
    <script>
        function clearCanvas() {
            const canvas = document.getElementById('canvas');
            const context = canvas.getContext('2d');
            context.clearRect(0, 0, canvas.width, canvas.height);
        }

        function nextKanji() {
            // Logic to switch to the next kanji character
        }

        document.getElementById('kanji').addEventListener('change', function() {
            document.getElementById('kanji-character').innerText = this.value;
            // Update other kanji info accordingly
        });
    </script>
</body>
</html>
